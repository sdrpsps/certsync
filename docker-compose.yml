# =============================================================================
# CertSync Docker Compose 配置
# 定义证书管理容器的卷挂载、网络和重启策略。
#
# 使用方式：
#   - 从 Docker Hub 拉取预构建镜像（默认，推荐）
#   - 本地构建：取消注释 build 行，注释 image 行
# =============================================================================

services:
  certsync:
    # --- 方式一：从 Docker Hub 拉取预构建镜像（推荐） ---
    image: sdrpsps/certsync:latest
    # --- 方式二：本地构建（取消注释下一行，注释上面的 image 行） ---
    # build: .
    container_name: certsync
    restart: on-failure:3
    network_mode: host
    # --- 开发模式（取消注释以启用） ---
    # environment:
    #   - SKIP_ISSUE=true # 跳过证书申请，仅测试部署逻辑
    #   - STAGING=true # 使用 Let's Encrypt 测试服务器（无速率限制）
    #   - ACME_DEBUG=1 # 开启 acme.sh debug 模式
    volumes:
      # acme.sh 数据持久化目录（证书、账户信息等）
      - ./acmedata:/acme.sh
      # SSH 私钥挂载（只读），用于远程分发证书
      - ./ssh_keys/id_ed25519:/root/.ssh/id_ed25519:ro
      # JSON 配置文件挂载（只读）
      - ./config.json:/config.json:ro
